name: Build rvgnu Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get current commit tag (if any)
        id: get_tag
        run: |
          TAG=$(git describe --tags --exact-match 2>/dev/null || true)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/rvgnu:latest ./rvgnu
          if [ -n "${{ steps.get_tag.outputs.tag }}" ]; then
            docker tag ghcr.io/${{ github.repository_owner }}/rvgnu:latest ghcr.io/${{ github.repository_owner }}/rvgnu:${{ steps.get_tag.outputs.tag }}
          fi

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/rvgnu:latest
          if [ -n "${{ steps.get_tag.outputs.tag }}" ]; then
            docker push ghcr.io/${{ github.repository_owner }}/rvgnu:${{ steps.get_tag.outputs.tag }}
          fi